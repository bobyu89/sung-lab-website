<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Nursing Innovation &amp; NP Training Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Inter:wght@500;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23FF79BC'/%3E%3Cstop offset='100%25' stop-color='%23FFA042'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cg fill='url(%23g)'%3E%3Crect x='24' y='4' width='16' height='24' rx='8'/%3E%3Crect x='24' y='36' width='16' height='24' rx='8'/%3E%3Crect x='4' y='24' width='24' height='16' rx='8'/%3E%3Crect x='36' y='24' width='24' height='16' rx='8'/%3E%3Crect x='24' y='24' width='16' height='16' rx='6'/%3E%3C/g%3E%3Cpath d='M32 41.2c-4.6-3.9-9.6-7.8-9.6-12.6 0-3.1 2.5-5.6 5.6-5.6 1.8 0 3.5.9 4 2.3.5-1.4 2.2-2.3 4-2.3 3.1 0 5.6 2.5 5.6 5.6 0 4.8-5 8.7-9.6 12.6z' fill='%23FFFFFF'/%3E%3C/svg%3E">
</head>
<body>
  <!-- ==========================================================================
       Page hero
       ========================================================================== -->
  <section class="section section--pink page-hero">
    <div class="dots" style="position: absolute; inset: 0; z-index: 0;"></div>
    <div class="container page-hero__inner reveal">
      <span class="mono-en page-hero__label">GALLERY</span>
      <h1 class="page-hero__title">Gallery</h1>
      <p class="page-hero__desc">Award moments, conference exchanges, and team activities — the lab's daily life and highlights.</p>
    </div>
  </section>

  <div class="ecg-divider"></div>

  <!-- ==========================================================================
       照片牆
       ========================================================================== -->
  <section class="section">
    <div class="container">
      <div class="section-header reveal">
        <h2 class="section-header__title">
          <span class="section-header__icon">
            <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <defs>
                <linearGradient id="gallery-logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#FF79BC"/>
                  <stop offset="100%" stop-color="#FFA042"/>
                </linearGradient>
              </defs>
              <g fill="url(#gallery-logo-grad)">
                <rect x="24" y="4" width="16" height="24" rx="8"/>
                <rect x="24" y="36" width="16" height="24" rx="8"/>
                <rect x="4" y="24" width="24" height="16" rx="8"/>
                <rect x="36" y="24" width="24" height="16" rx="8"/>
                <rect x="24" y="24" width="16" height="16" rx="6"/>
              </g>
            </svg>
          </span>
          Moments
        </h2>
        <span class="mono-en">MOMENTS</span>
      </div>

      <div class="photo-wall" id="photo-wall">
        <!-- renderPhotoWall() populates this from fetchPhotos(0) -->
      </div>
    </div>
  </section>

  <script src="../js/data.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/animations.js"></script>
  <script>
    initLayout('gallery', 'en');
    initReveal();

    function escapeHtml(str) {
      if (!str) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function renderPhotoWall() {
      const wall = document.getElementById('photo-wall');
      if (!wall) return;
      const photos = await fetchPhotos(0);
      wall.innerHTML = photos.map((photo, i) => `
<button type="button" class="photo-wall__item reveal" data-reveal-group="photo" data-src="${escapeHtml(photo.src)}" data-caption="${escapeHtml(photo.caption)}" aria-label="Enlarge: ${escapeHtml(photo.caption)}">
  <img src="${escapeHtml(photo.thumb)}" alt="${escapeHtml(photo.caption)}" loading="lazy">
</button>`).join('');

      wall.querySelectorAll('.photo-wall__item').forEach((btn) => {
        btn.addEventListener('click', () => {
          openLightbox(btn.dataset.src, btn.dataset.caption);
        });
      });

      initReveal();
    }

    renderPhotoWall();
  </script>
  <script src="../js/vendor/anime.umd.min.js"></script>
  <script src="../js/micro.js"></script>
</body>
</html>
