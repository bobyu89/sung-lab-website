  <section class="section">

        <h2 class="section-header__title">
          <span class="section-header__icon">
            <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

          </div>
          <div class="member-card__block">
            <h4>論文題目</h4>

          </div>
          <div class="member-card__block">
            <h4>學經歷</h4>
            <ul>
              <li>基隆長庚醫院內科護理師</li>
              <li>國防醫學大學護理學系專科護理師所 碩士二年級</li>
            </ul>
          </div>
        </div>
        <div class="card member-card reveal" data-reveal-group="members">

            <span class="avatar member-card__avatar">李</span>
            <div>
              <h3 class="member-card__name">李妍鋅</h3>
              <p class="member-card__role">碩士班研究生</p>

          </div>
