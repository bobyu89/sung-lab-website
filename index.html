<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>護理創新及專科訓練研究室</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Inter:wght@500;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23FF79BC'/%3E%3Cstop offset='100%25' stop-color='%23FFA042'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cg fill='url(%23g)'%3E%3Crect x='24' y='4' width='16' height='24' rx='8'/%3E%3Crect x='24' y='36' width='16' height='24' rx='8'/%3E%3Crect x='4' y='24' width='24' height='16' rx='8'/%3E%3Crect x='36' y='24' width='24' height='16' rx='8'/%3E%3Crect x='24' y='24' width='16' height='16' rx='6'/%3E%3C/g%3E%3Cpath d='M32 41.2c-4.6-3.9-9.6-7.8-9.6-12.6 0-3.1 2.5-5.6 5.6-5.6 1.8 0 3.5.9 4 2.3.5-1.4 2.2-2.3 4-2.3 3.1 0 5.6 2.5 5.6 5.6 0 4.8-5 8.7-9.6 12.6z' fill='%23FFFFFF'/%3E%3C/svg%3E">
</head>
<body>
  <!-- ==========================================================================
       Hero
       ========================================================================== -->
  <section class="section section--pink hero">
    <div class="dots" style="position: absolute; inset: 0; z-index: 0;"></div>
    <div class="blob" style="top: -120px; right: -140px;"></div>
    <div class="blob" style="bottom: -160px; left: -160px; width: 360px; height: 360px;"></div>
    <div class="container hero__inner">
      <div class="hero__copy reveal">
        <span class="chip">護理創新及專科訓練研究室</span>
        <h1 class="hero__title">
          以護理、<span class="hl-pink">研究與創新</span>，打造更<span class="hl-orange">智慧</span>的臨床未來
        </h1>
        <p class="hero__subtitle">結合專師照護、實證研究、教育創新與科技應用。以實證推動照護品質，提升健康福祉。</p>
        <div class="hero__chips">
          <span class="chip">實證為本</span>
          <span class="chip">創新驅動</span>
          <span class="chip">以人為本</span>
        </div>
        <div class="hero__actions">
          <a href="research.html" class="btn btn-primary">探索研究</a>
          <a href="publications.html" class="btn btn-outline">查看成果</a>
        </div>
      </div>
      <div class="hero__art-wrap reveal">
        <img class="hero-art" src="assets/hero-illustration.png" alt="護理研究插畫"
          onerror="this.classList.add('hero-art--placeholder'); this.removeAttribute('src'); this.onerror=null;">
      </div>
    </div>
  </section>

  <div class="ecg-divider"></div>

  <!-- ==========================================================================
       研究核心領域 (Research Focus)
       ========================================================================== -->
  <section class="section">
    <div class="container">
      <div class="section-header reveal">
        <h2 class="section-header__title">
          <span class="section-header__icon">
            <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <defs>
                <linearGradient id="focus-logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#FF79BC"/>
                  <stop offset="100%" stop-color="#FFA042"/>
                </linearGradient>
              </defs>
              <g fill="url(#focus-logo-grad)">
                <rect x="24" y="4" width="16" height="24" rx="8"/>
                <rect x="24" y="36" width="16" height="24" rx="8"/>
                <rect x="4" y="24" width="24" height="16" rx="8"/>
                <rect x="36" y="24" width="24" height="16" rx="8"/>
                <rect x="24" y="24" width="16" height="16" rx="6"/>
              </g>
            </svg>
          </span>
          研究核心領域
        </h2>
        <span class="mono-en">OUR FOCUS</span>
      </div>

      <div class="focus-grid">
        <div class="card focus-card reveal" data-reveal-group="focus">
          <span class="focus-card__icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#D9367F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4.5 3v6a4.5 4.5 0 0 0 9 0V3"/>
              <path d="M8 3h1"/>
              <path d="M12.5 3h1"/>
              <path d="M13.5 12.5a5 5 0 0 1-10 0"/>
              <path d="M18.5 15a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/>
              <path d="M18.5 10v2.5"/>
            </svg>
          </span>
          <h3 class="focus-card__title">專科護理師發展與訓練</h3>
          <p class="focus-card__text">探討專師執業環境、領導風格與工作滿意度，培育新世代進階護理人才。</p>
        </div>

        <div class="card focus-card reveal" data-reveal-group="focus">
          <span class="focus-card__icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#D9480F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 3 3 7.5 12 12l9-4.5L12 3z"/>
              <path d="M3 7.5v9L12 21l9-4.5v-9"/>
              <path d="M12 12v9"/>
            </svg>
          </span>
          <h3 class="focus-card__title">創新教學與 3D 列印應用</h3>
          <p class="focus-card__text">以 3D 列印教具與教育性桌遊革新臨床訓練與衛教。</p>
        </div>

        <div class="card focus-card reveal" data-reveal-group="focus">
          <span class="focus-card__icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#D9367F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9.5 3.5a3 3 0 0 0-3 3v.3A3.5 3.5 0 0 0 5 12.5a3.5 3.5 0 0 0 1.3 6A3 3 0 0 0 9.5 21h1a1 1 0 0 0 1-1V5a1.5 1.5 0 0 0-2-1.5z"/>
              <path d="M14.5 3.5a3 3 0 0 1 3 3v.3A3.5 3.5 0 0 1 19 12.5a3.5 3.5 0 0 1-1.3 6A3 3 0 0 1 14.5 21h-1a1 1 0 0 1-1-1V5a1.5 1.5 0 0 1 2-1.5z"/>
            </svg>
          </span>
          <h3 class="focus-card__title">認知訓練與失智照護</h3>
          <p class="focus-card__text">發展多面向認知訓練，改善輕度認知障礙與失智長者的認知功能。</p>
        </div>

        <div class="card focus-card reveal" data-reveal-group="focus">
          <span class="focus-card__icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#D9480F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 2.5s6 7 6 11.5a6 6 0 1 1-12 0c0-4.5 6-11.5 6-11.5z"/>
              <path d="M9.5 14.5a2.5 2.5 0 0 0 2.5 2.5"/>
            </svg>
          </span>
          <h3 class="focus-card__title">吞嚥健康與高齡復健</h3>
          <p class="focus-card__text">以舌肌力訓練與吞嚥復健實證，守護高齡者進食安全與生活品質。</p>
        </div>
      </div>
    </div>
  </section>

  <section id="contact"></section>

  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/animations.js"></script>
  <script>
    initLayout('index');
    initReveal();
    initCounters();
  </script>
</body>
</html>
