<body>
  <!-- ==========================================================================
       Page hero
       ========================================================================== -->
  <section class="section section--pink page-hero">
    <div class="dots" style="position: absolute; inset: 0; z-index: 0;"></div>
    <div class="container page-hero__inner reveal">
      <span class="mono-en page-hero__label">COLLABORATION</span>
      <h1 class="page-hero__title">合作交流</h1>
      <p class="page-hero__desc">合作夥伴、研究招募與產學連結，攜手推動護理研究與創新。</p>
    </div>
  </section>

  <div class="ecg-divider"></div>

  <!-- ==========================================================================
       合作項目
       ========================================================================== -->
  <section class="section">
    <div class="container">
      <div class="section-header reveal">
        <h2 class="section-header__title">
          <span class="section-header__icon">
            <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <defs>
                <linearGradient id="collab-logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#FF79BC"/>
                  <stop offset="100%" stop-color="#FFA042"/>
                </linearGradient>
              </defs>
              <g fill="url(#collab-logo-grad)">
                <rect x="24" y="4" width="16" height="24" rx="8"/>
                <rect x="24" y="36" width="16" height="24" rx="8"/>
                <rect x="4" y="24" width="24" height="16" rx="8"/>
                <rect x="36" y="24" width="24" height="16" rx="8"/>
                <rect x="24" y="24" width="16" height="16" rx="6"/>
              </g>
            </svg>
          </span>
          合作交流
        </h2>
        <span class="mono-en">PARTNERSHIP</span>
      </div>

      <div class="wip-grid">
        <div class="card wip-card reveal" data-reveal-group="collab">
          <h3 class="wip-card__title">合作夥伴</h3>
          <div class="wip">合作夥伴內容建置中</div>
        </div>
        <div class="card wip-card reveal" data-reveal-group="collab">
          <h3 class="wip-card__title">研究招募</h3>
          <div class="wip">研究招募內容建置中</div>
        </div>
        <div class="card wip-card reveal" data-reveal-group="collab">
          <h3 class="wip-card__title">產學連結</h3>
          <div class="wip">產學連結內容建置中</div>
        </div>
      </div>
    </div>
  </section>

  <div class="ecg-divider"></div>

  <!-- ==========================================================================
       活動花絮導引（照片牆已移至 gallery.html）
       ========================================================================== -->
  <section class="section section--pink">
    <div class="container" style="text-align: center;">

      <a class="btn btn-primary reveal" href="gallery.html">前往活動花絮 →</a>
    </div>
  </section>
